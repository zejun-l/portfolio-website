<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background-color: #f8f9fa;
            border-right: 1px solid #dadce0;
            padding: 24px 0;
            overflow-y: auto;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .sidebar.closed {
            width: 0;
            padding: 0;
            border-right: none;
        }

        .sidebar-content {
            padding-left: 24px;
            padding-right: 16px;
        }

        .sidebar h2 {
            font-size: 18px;
            font-weight: 600;
            color: #202124;
            margin: 0 0 32px 0;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #5f6368;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        .nav-item.active {
            color: #1f2937;
            background-color: #e8f0fe;
        }

        .nav-item:hover:not(.active) {
            background-color: #f1f3f4;
            color: #202124;
        }

        .nav-icon {
            display: flex;
            align-items: center;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #dadce0;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #5f6368;
            display: flex;
            align-items: center;
        }

        .search-bar {
            flex: 0 1 350px;
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 24px;
            padding: 8px 16px;
        }

        .search-bar input {
            border: none;
            outline: none;
            font-size: 14px;
            background-color: transparent;
            flex: 1;
            color: #202124;
        }

        .search-bar input::placeholder {
            color: #9aa0a6;
        }

        .avatar {
            font-size: 24px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px 24px;
            background-color: #ffffff;
        }

        .content-wrapper {
            max-width: 1200px;
        }

        .content-area h1 {
            font-size: 28px;
            font-weight: 600;
            color: #202124;
            margin: 0 0 8px 0;
        }

        .project-count {
            font-size: 14px;
            color: #5f6368;
            margin: 0 0 32px 0;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .project-card {
            background-color: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .project-card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-color: #c6c6c6;
        }

        .project-icon {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background-color: #f8f9fa;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .project-card h3 {
            font-size: 15px;
            font-weight: 600;
            color: #202124;
            margin: 0 0 8px 0;
        }

        .project-card p {
            font-size: 13px;
            color: #5f6368;
            margin: 0 0 16px 0;
            line-height: 1.5;
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f1f3f4;
            font-size: 12px;
            color: #9aa0a6;
        }

        .status-badge {
            font-size: 12px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .status-active {
            background-color: #e3f2fd;
            color: #1f2937;
        }

        .status-completed {
            background-color: #f5f5f5;
            color: #5f6368;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #9aa0a6;
            font-size: 14px;
        }

        svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <h2>Portfolio</h2>
                <nav class="nav" id="nav">
                    <!-- Navigation items will be inserted here -->
                </nav>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <button class="menu-btn" id="menuBtn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="3" y1="6" x2="17" y2="6"></line>
                        <line x1="3" y1="10" x2="17" y2="10"></line>
                        <line x1="3" y1="14" x2="17" y2="14"></line>
                    </svg>
                </button>

                <div class="search-bar">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" style="color: #9aa0a6;">
                        <circle cx="8" cy="8" r="6"></circle>
                        <path d="M12 12l4 4"></path>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search projects...">
                </div>

                <div class="avatar">👤</div>
            </div>

            <div class="content-area">
                <div class="content-wrapper">
                    <h1>Welcome to my portfolio</h1>
                    <div class="project-count" id="projectCount">4 projects found</div>
                    <div class="projects-grid" id="projectsGrid">
                        <!-- Projects will be inserted here -->
                    </div>
                    <div class="empty-state" id="emptyState" style="display: none;">
                        No projects found matching "<span id="searchTerm"></span>"
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const navigationItems = [
            { icon: 'overview', label: 'Overview', id: 'overview' },
            { icon: 'folder', label: 'Projects', id: 'projects' },
            { icon: 'briefcase', label: 'Experience', id: 'experience' },
            { icon: 'settings', label: 'Skills', id: 'skills' },
            { icon: 'document', label: 'Blog', id: 'blog' },
            { icon: 'mail', label: 'Contact', id: 'contact' },
        ];

        const projects = [
            {
                id: 1,
                title: 'Design System',
                description: 'Comprehensive component library and design documentation',
                date: 'Mar 2024',
                status: 'Active',
            },
            {
                id: 2,
                title: 'Mobile App Redesign',
                description: 'UX improvements and modern visual refresh',
                date: 'Feb 2024',
                status: 'Completed',
            },
            {
                id: 3,
                title: 'Analytics Dashboard',
                description: 'Real-time data visualization and reporting platform',
                date: 'Jan 2024',
                status: 'Completed',
            },
            {
                id: 4,
                title: 'Brand Guidelines',
                description: 'Updated brand identity with new color palette',
                date: 'Dec 2023',
                status: 'Completed',
            },
        ];

        function getIcon(iconName) {
            const icons = {
                overview: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10a7 7 0 1 0 14 0A7 7 0 0 0 3 10z"/><path d="M10 6v4l3 1.5"/></svg>',
                folder: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h6l1.5-1.5A1 1 0 0 1 10 2h8a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/></svg>',
                briefcase: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="16" height="12" rx="1"/><path d="M6 5V3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><line x1="10" y1="9" x2="10" y2="13"/></svg>',
                settings: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="3"/><path d="M10 3v1.5M10 15.5V17M17 10h-1.5M4.5 10H3M15.6 4.4l-1.05 1.05M5.45 14.55l-1.05 1.05M15.6 15.6l-1.05-1.05M5.45 5.45l-1.05-1.05"/></svg>',
                document: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 2h9l3 3v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/><line x1="6" y1="7" x2="14" y2="7"/><line x1="6" y1="11" x2="14" y2="11"/><line x1="6" y1="15" x2="10" y2="15"/></svg>',
                mail: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="16" height="14" rx="1"/><path d="M2 4.5l8 5 8-5"/></svg>',
            };
            return icons[iconName] || '';
        }

        function renderNavigation() {
            const nav = document.getElementById('nav');
            nav.innerHTML = navigationItems.map(item => `
                <div class="nav-item ${item.id === 'overview' ? 'active' : ''}" data-id="${item.id}">
                    <div class="nav-icon">${getIcon(item.icon)}</div>
                    <span>${item.label}</span>
                </div>
            `).join('');
        }

        function renderProjects(filtered = projects) {
            const grid = document.getElementById('projectsGrid');
            const emptyState = document.getElementById('emptyState');
            const projectCount = document.getElementById('projectCount');

            projectCount.textContent = `${filtered.length} projects found`;

            if (filtered.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                document.getElementById('searchTerm').textContent = document.getElementById('searchInput').value;
            } else {
                grid.style.display = 'grid';
                emptyState.style.display = 'none';
                grid.innerHTML = filtered.map(project => `
                    <div class="project-card">
                        <div class="project-icon">📁</div>
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <div class="project-footer">
                            <span>${project.date}</span>
                            <span class="status-badge ${project.status === 'Active' ? 'status-active' : 'status-completed'}">${project.status}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        let sidebarOpen = true;
        document.getElementById('menuBtn').addEventListener('click', () => {
            sidebarOpen = !sidebarOpen;
            document.getElementById('sidebar').classList.toggle('closed');
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = projects.filter(project =>
                project.title.toLowerCase().includes(query) ||
                project.description.toLowerCase().includes(query)
            );
            renderProjects(filtered);
        });

        renderNavigation();
        renderProjects();
    </script>
</body>
</html>
